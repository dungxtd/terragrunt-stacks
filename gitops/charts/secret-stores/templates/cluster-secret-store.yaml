{{- /* Vault backend SA — created in external-secrets ns, bound to Vault role.
   Distinct name (vault-secret-store) so it doesn't collide with the
   operator's own ServiceAccount/external-secrets created by the
   external-secrets Helm chart. */ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secret-store
  namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: {{ .Values.vault.address | quote }}
      path:    {{ .Values.vault.kvPath | default "secret" | quote }}
      version: "v2"
      auth:
        kubernetes:
          mountPath: {{ .Values.vault.k8sAuthMount | default "kubernetes" | quote }}
          role:      {{ .Values.vault.role | default "external-secrets" | quote }}
          serviceAccountRef:
            name:      vault-secret-store
            namespace: external-secrets

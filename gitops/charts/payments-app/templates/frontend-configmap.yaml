apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-conf
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "payments-app.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://public-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }

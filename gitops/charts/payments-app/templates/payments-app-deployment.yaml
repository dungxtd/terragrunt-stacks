apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-app
  namespace: {{ .Values.namespace }}
  labels:
    app: payments-app
    {{- include "payments-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.paymentsApp.replicas }}
  selector:
    matchLabels:
      app: payments-app
  template:
    metadata:
      labels:
        app: payments-app
      annotations:
        {{- if eq .Values.mesh "linkerd" }}
        linkerd.io/inject: enabled
        # vault-agent-init runs while linkerd-proxy not ready; skip mesh on vault
        # ports so init auth bypass linkerd-proxy redirect (else conn refused).
        config.linkerd.io/skip-outbound-ports: "8200,8201"
        {{- end }}
        {{- if eq .Values.mesh "consul" }}
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service-upstreams: "payments-processor:9090,payments-app-database:5432"
        {{- else }}
        consul.hashicorp.com/connect-inject: "false"
        {{- end }}
        {{- if eq .Values.secrets "vault" }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "payments"
        # Render Spring Boot application.properties so Spring datasource auto-config
        # picks up dynamic creds. SPRING_CONFIG_ADDITIONAL_LOCATION points app at it.
        vault.hashicorp.com/agent-inject-secret-application.properties: "payments-app/database/creds/payments"
        vault.hashicorp.com/agent-inject-template-application.properties: |
          {{`{{- with secret "payments-app/database/creds/payments" -}}
          spring.datasource.url=jdbc:postgresql://payments-app-database:5432/payments?sslmode=require
          spring.datasource.username={{ .Data.username }}
          spring.datasource.password={{ .Data.password }}
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
          {{- end }}`}}
        {{- end }}
    spec:
      serviceAccountName: payments-app
      containers:
        - name: payments-app
          image: {{ .Values.paymentsApp.image }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NAME
              value: "payments-app"
            - name: JAEGER_DISABLED
              value: "true"
            {{- if eq .Values.secrets "vault" }}
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/vault/secrets/"
            {{- end }}
            {{- if eq .Values.secrets "sops" }}
            - name: DB_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: payments-app-db-creds
                  key: connection_string
            {{- end }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 640Mi

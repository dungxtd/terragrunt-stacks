{{- if .Values.canary.enabled }}
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: payments-app
  namespace: {{ .Values.namespace }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payments-app
  progressDeadlineSeconds: 60
  service:
    port: 8080
    targetPort: 8080
    gatewayRefs:
      - name: payments-app
        namespace: {{ .Values.namespace }}
        group: core
        kind: Service
        port: 8080
  analysis:
    interval: 30s
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics:
      - name: linkerd-success-rate
        templateRef:
          name: linkerd-success-rate
        thresholdRange:
          min: 99
        interval: 1m
      - name: linkerd-request-duration
        templateRef:
          name: linkerd-request-duration
        thresholdRange:
          max: 500
        interval: 1m
    webhooks:
      - name: load-test
        type: rollout
        url: http://flagger-loadtester.flagger-system/
        metadata:
          cmd: "hey -z 2m -q 10 -c 2 http://payments-app.{{ .Values.namespace }}:8080/"
{{- end }}

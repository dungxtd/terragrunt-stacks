apiVersion: v1
kind: Service
metadata:
  name: public-api
  namespace: {{ .Values.namespace }}
  labels:
    app: public-api
    {{- include "payments-app.labels" . | nindent 4 }}
spec:
  selector:
    app: public-api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP

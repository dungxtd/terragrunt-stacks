apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api
  namespace: {{ .Values.namespace }}
  labels:
    app: public-api
    {{- include "payments-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.publicApi.replicas }}
  selector:
    matchLabels:
      app: public-api
  template:
    metadata:
      labels:
        app: public-api
      annotations:
        {{- if eq .Values.mesh "linkerd" }}
        linkerd.io/inject: enabled
        {{- end }}
        {{- if eq .Values.mesh "consul" }}
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service-upstreams: "payments-app:8080"
        {{- else }}
        consul.hashicorp.com/connect-inject: "false"
        {{- end }}
    spec:
      containers:
        - name: public-api
          image: {{ .Values.publicApi.image }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: BIND_ADDRESS
              value: ":8080"
            - name: METRICS_ADDRESS
              value: ":9102"
            - name: PAYMENT_API_URI
              value: "http://payments-app:8080"
            - name: PRODUCT_API_URI
              value: "http://product-api:9090"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

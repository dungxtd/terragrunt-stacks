# Shared ALB (group.name=platform) — payments-app only.
# Other UIs (argocd, consul, vault, linkerd-viz) accessible via kubectl port-forward.
#
# Get ALB hostname:
#   kubectl get ingress payments-app -n payments-app -o wide
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payments-app
  namespace: payments-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

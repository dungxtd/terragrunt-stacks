# HotROD — Uber's official Jaeger demo. 4 microservices in one image
# (frontend, customer, driver, route) showing distributed tracing.
# Sends spans to Jaeger via OTLP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotrod
  namespace: tracing
  labels:
    app: hotrod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotrod
  template:
    metadata:
      labels:
        app: hotrod
    spec:
      containers:
        - name: hotrod
          image: jaegertracing/example-hotrod:1.62.0
          imagePullPolicy: IfNotPresent
          args: ["all"]
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.tracing:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
          ports:
            - name: frontend
              containerPort: 8080
              protocol: TCP
            - name: customer
              containerPort: 8081
              protocol: TCP
            - name: driver
              containerPort: 8082
              protocol: TCP
            - name: route
              containerPort: 8083
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hotrod
  namespace: tracing
  labels:
    app: hotrod
spec:
  type: ClusterIP
  selector:
    app: hotrod
  ports:
    - name: frontend
      port: 8080
      targetPort: 8080

global:
  name: consul
  datacenter: dc1
  acls:
    manageSystemACLs: true
  tls:
    enabled: true
  metrics:
    enabled: true
    enableAgentMetrics: true

server:
  enabled: true
  replicas: 1
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # ui.contentPath shorthand broken in chart 1.9.x — set via raw agent config
  extraConfig: |
    {
      "ui_config": {
        "content_path": "/consul"
      }
    }

client:
  enabled: true

connectInject:
  enabled: true
  default: true
  transparentProxy:
    defaultEnabled: true
  apiGateway:
    manageExternalCRDs: false

terminatingGateways:
  enabled: false

meshGateway:
  enabled: false

ui:
  enabled: true
  service:
    type: ClusterIP

global:
  name: consul
  datacenter: dc1
  acls:
    manageSystemACLs: true
  tls:
    enabled: true
  metrics:
    enabled: true
    enableAgentMetrics: true

server:
  enabled: true
  replicas: 1
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

client:
  enabled: true

connectInject:
  enabled: true
  default: true
  transparentProxy:
    defaultEnabled: true

apiGateway:
  enabled: true
  managedGatewayClass:
    serviceType: ClusterIP  # free tier: no extra LB (~$16/mo)

terminatingGateways:
  enabled: false

meshGateway:
  enabled: false

ui:
  enabled: true
  service:
    type: ClusterIP
  # Subpath for shared ALB at /consul
  contentPath: /consul

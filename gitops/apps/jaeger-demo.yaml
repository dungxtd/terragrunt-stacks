apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jaeger-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"   # after platform stack (kube-prometheus-stack=2, flagger=3, payments-app=4)
spec:
  project: platform
  source:
    repoURL: https://github.com/dungxtd/terragrunt-stacks
    targetRevision: main
    path: gitops/platform/jaeger-demo
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: tracing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

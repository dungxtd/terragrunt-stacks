apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: kube-prometheus-stack
            repoURL: https://prometheus-community.github.io/helm-charts
            chart: kube-prometheus-stack
            targetRevision: "65.2.0"
            namespace: monitoring
            wave: "2"

          - app: flagger
            repoURL: https://flagger.app
            chart: flagger
            targetRevision: "1.43.0"
            namespace: flagger-system
            wave: "3"

          - app: loadtester
            repoURL: https://flagger.app
            chart: loadtester
            targetRevision: "0.37.0"
            namespace: flagger-system
            wave: "3"

  template:
    metadata:
      name: "{{app}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "{{wave}}"
    spec:
      project: platform
      sources:
        - repoURL: "{{repoURL}}"
          chart: "{{chart}}"
          targetRevision: "{{targetRevision}}"
          helm:
            valueFiles:
              - $values/gitops/values/{{app}}/production.yaml
        - repoURL: https://github.com/dungxtd/terragrunt-stacks
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      ignoreDifferences:
        - group: batch
          kind: Job
          jsonPointers:
            - /spec/template/metadata/annotations
            - /spec/template/spec
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true   # required for kube-prometheus-stack — CRDs exceed 262KB annotation limit

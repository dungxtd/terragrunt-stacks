apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: consul
            repoURL: https://helm.releases.hashicorp.com
            chart: consul
            targetRevision: "1.9.7"   # appVersion 1.22.7 — pin; bump via Renovate
            namespace: consul
            wave: "1"

          - app: datadog
            repoURL: https://helm.datadoghq.com
            chart: datadog
            targetRevision: "3.205.0" # appVersion 7.x
            namespace: datadog
            wave: "2"

          - app: flagger
            repoURL: https://flagger.app
            chart: flagger
            targetRevision: "1.43.0"
            namespace: flagger-system
            wave: "3"

  template:
    metadata:
      name: "{{app}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{wave}}"
    spec:
      project: default
      sources:
        - repoURL: "{{repoURL}}"
          chart: "{{chart}}"
          targetRevision: "{{targetRevision}}"
          helm:
            valueFiles:
              - $values/gitops/values/{{app}}/production.yaml
        - repoURL: https://github.com/dungxtd/terragrunt-stacks
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      ignoreDifferences:
        - group: batch
          kind: Job
          jsonPointers:
            - /spec/template/metadata/annotations
            - /spec/template/spec
        - group: ""
          kind: Secret
          name: datadog-cluster-agent
          jsonPointers:
            - /data
        - group: ""
          kind: ConfigMap
          name: datadog-kpi-telemetry-configmap
          jsonPointers:
            - /data
        - group: apps
          kind: Deployment
          name: datadog-cluster-agent
          jsonPointers:
            - /spec/template/metadata/annotations
            - /spec/template/spec/containers
        - group: apps
          kind: StatefulSet
          name: consul-server
          jsonPointers:
            - /spec/template/metadata/annotations
            - /spec/template/spec/containers
            - /spec/volumeClaimTemplates
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

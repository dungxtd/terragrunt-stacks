apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secret-stores
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # after external-secrets (wave 0), before consumers
spec:
  project: platform
  sources:
    - repoURL: https://github.com/dungxtd/terragrunt-stacks
      targetRevision: main
      path: gitops/charts/secret-stores
      helm:
        valueFiles:
          - $values/gitops/values/secret-stores/production.yaml
    - repoURL: https://github.com/dungxtd/terragrunt-stacks
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

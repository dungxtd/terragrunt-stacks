name: Deploy GitOps

on:
  push:
    branches: [main]
    paths:
      - "gitops/**"
      - ".github/workflows/gitops.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  EKS_CLUSTER: terragrunt-infra-eks

jobs:
  sync:
    name: Sync GitOps
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD ApplicationSet
        run: |
          kubectl apply -f gitops/appset.yaml
          echo "✓ ArgoCD ApplicationSet applied"

      - name: Ensure namespaces
        run: |
          for ns in consul payments-app; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "✓ Namespaces ready"

      - name: Apply platform UI ingresses
        run: |
          kubectl apply -f gitops/platform-ui/
          echo "✓ Platform UI ingresses applied"

      - name: Trigger ArgoCD sync
        run: |
          # Install ArgoCD CLI
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

          # Login via port-forward
          kubectl port-forward svc/argocd-server -n argocd 8443:443 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          sleep 5

          ARGOCD_PWD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath='{.data.password}' | base64 -d)
          argocd login localhost:8443 \
            --username admin \
            --password "$ARGOCD_PWD" \
            --insecure \
            --grpc-web

          # Sync all apps that changed (ArgoCD auto-detects via git polling,
          # but explicit sync ensures immediate convergence)
          argocd app list -o name | while read app; do
            echo "Syncing $app..."
            argocd app sync "$app" --async --prune || true
          done
          echo "✓ ArgoCD sync triggered"

      - name: Print platform URLs
        run: |
          echo "Waiting up to 3m for shared ALB (group=platform)..."
          for i in {1..18}; do
            host=$(kubectl -n argocd get ingress argocd-ui \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -n "$host" ] && break
            sleep 10
          done
          if [ -z "$host" ]; then
            echo "ALB not yet provisioned — check 'kubectl get ingress -A -l alb.group=platform'"
            exit 0
          fi
          echo ""
          echo "═══ Shared ALB: $host ═══"
          echo "  ArgoCD     → http://$host/argocd"
          echo "  Consul     → http://$host/consul"
          echo "  Vault*     → http://$host/vault"
          echo "  Linkerd*   → http://$host/linkerd"
          echo "  Frontend   → http://$host/"

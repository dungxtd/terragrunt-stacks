name: Deploy GitOps

on:
  # Chain after Deploy Infrastructure: if a push touches both units/ and gitops/,
  # GitHub fires deploy.yml + gitops.yml in parallel. workflow_run gates this
  # workflow on deploy.yml succeeding first, so Vault roles / IRSA / CRDs the
  # gitops layer depends on are guaranteed to exist before ArgoCD reconciles.
  workflow_run:
    workflows: ["Deploy Infrastructure"]
    types: [completed]
    branches: [main]
  # Direct trigger when ONLY gitops/ files change (deploy.yml's paths allow-list
  # excludes gitops/, so it doesn't fire — no race possible).
  push:
    branches: [main]
    paths:
      - "gitops/**"
      - ".github/workflows/gitops.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  EKS_CLUSTER: terragrunt-infra-eks

jobs:
  sync:
    name: Sync GitOps
    runs-on: ubuntu-latest
    environment: production
    # Skip if upstream Deploy Infrastructure failed/cancelled.
    # When triggered by push (no upstream), event is 'push' and condition true.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5
        with:
          # workflow_run uses default branch SHA; pin to triggering commit for traceability
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply App-of-Apps root
        run: |
          kubectl apply -f gitops/apps/root.yaml
          echo "✓ ArgoCD root Application applied — child apps + ingresses converge via auto-sync"

name: Deploy GitOps

on:
  push:
    branches: [main]
    paths:
      - "gitops/**"
      - ".github/workflows/gitops.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  EKS_CLUSTER: terragrunt-infra-eks

jobs:
  sync:
    name: Sync GitOps
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD ApplicationSet
        run: |
          kubectl apply -f gitops/appset.yaml
          echo "✓ ArgoCD ApplicationSet applied"

      - name: Ensure namespaces
        run: |
          for ns in consul payments-app; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "✓ Namespaces ready"

      - name: Apply platform UI ingresses
        run: |
          kubectl apply -f gitops/platform-ui/
          echo "✓ Platform UI ingresses applied"

      - name: Wait for ArgoCD auto-sync
        run: |
          echo "✓ ArgoCD ApplicationSet applied — auto-sync will converge within a few minutes"
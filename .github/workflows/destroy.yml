name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
      force_unlock:
        description: "Force-unlock stale state locks before destroying"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:   ap-southeast-1
  TF_VERSION:   "1.12.2"
  # TG_VERSION omitted — Makefile is the single source; `make setup-terragrunt` installs it
  CLUSTER_NAME: terragrunt-infra-eks
  PROJECT_TAG:  terragrunt-infra
  STATE_BUCKET: tf-state-terragrunt-stacks
  STATE_PREFIX: stacks/vault-consul/production

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: make setup-terragrunt

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Update kubeconfig
        run: make kubeconfig || echo "cluster may already be destroyed"

      - name: Pre-destroy
        run: make predestroy-production

      - name: Force-unlock stale locks
        if: github.event.inputs.force_unlock == 'true'
        run: make force-unlock

      - name: Destroy
        env:
          GITHUB_CONFIG_URL: ${{ secrets.GITHUB_CONFIG_URL }}
          GITHUB_APP_ID: ${{ secrets.ARC_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.ARC_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.ARC_APP_PRIVATE_KEY }}
        run: make stack-vault-production destroy

      - name: Post-destroy
        if: always()
        run: make postdestroy-production

name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "units/**"
      - "stacks/**"
      - "_common/**"
      - "common.hcl"
      - "root.hcl"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "units/**"
      - "stacks/**"
      - "_common/**"
      - "common.hcl"
      - "root.hcl"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run apply step (otherwise validate + plan only)"
        type: boolean
        default: false
      force_unlock:
        description: "Force-unlock stale state locks before applying"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION:   ap-southeast-1
  # TF_VERSION pinned here for hashicorp/setup-terraform action input.
  # TG_VERSION lives in Makefile — `make setup-terragrunt` is the single install path.
  TF_VERSION:   "1.12.2"
  # destroy.mk / deploy share these defaults; workflows override only in env: when needed
  CLUSTER_NAME: terragrunt-infra-eks
  PROJECT_TAG:  terragrunt-infra
  STATE_BUCKET: tf-state-terragrunt-stacks
  STATE_PREFIX: stacks/vault-consul/production

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: make setup-terragrunt

      - name: Check HCL/TF formatting
        run: make fmt-check

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate stack
        run: make stack-vault-production-validate

      - name: Policy as code (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: units
          framework: terraform
          output_format: cli
          soft_fail: false
          skip_check: CKV_AWS_144,CKV_AWS_18,CKV_TF_1,CKV2_AWS_5

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: make setup-terragrunt

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: IAM check
        run: make iam-check

      # Vault provider before_hook port-forwards via kubectl; kubeconfig must
      # exist before plan runs. Tolerate failure on first deploy (no cluster yet).
      - name: Update kubeconfig
        run: make kubeconfig || echo "cluster may not exist yet — first deploy"

      - name: Plan
        id: plan
        env:
          GITHUB_CONFIG_URL: ${{ secrets.GITHUB_CONFIG_URL }}
          GITHUB_APP_ID: ${{ secrets.ARC_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.ARC_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.ARC_APP_PRIVATE_KEY }}
        run: |
          make stack-vault-production plan 2>&1 | tee plan.log
          exitcode=${PIPESTATUS[0]}
          echo "exitcode=$exitcode" >> "$GITHUB_OUTPUT"
          [ "$exitcode" -eq 1 ] && exit 1 || exit 0

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('stacks/vault-consul/production/plan.log', 'utf8');
            const truncated = log.length > 60000 ? '...(truncated)\n' + log.slice(-60000) : log;
            const body = `### Terragrunt Plan\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.apply)
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: make setup-terragrunt

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Update kubeconfig
        run: make kubeconfig || echo "cluster may not exist yet — first deploy"

      - name: Force-unlock stale locks
        if: github.event.inputs.force_unlock == 'true'
        run: make force-unlock

      - name: Apply
        env:
          GITHUB_CONFIG_URL: ${{ secrets.GITHUB_CONFIG_URL }}
          GITHUB_APP_ID: ${{ secrets.ARC_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.ARC_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.ARC_APP_PRIVATE_KEY }}
        run: make stack-vault-production apply

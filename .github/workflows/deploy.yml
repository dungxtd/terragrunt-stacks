name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths-ignore:
      - "gitops/**"
      - ".github/workflows/gitops.yml"
      - ".github/workflows/destroy.yml"
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "gitops/**"
      - ".github/workflows/gitops.yml"
      - ".github/workflows/destroy.yml"
      - "docs/**"
      - "*.md"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run apply step (otherwise validate + plan only)"
        type: boolean
        default: false

permissions:
  id-token: write   # OIDC token for AWS auth
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.12.2"
  TG_VERSION: "1.0.3"
  TG_FLAGS: --non-interactive --backend-bootstrap
  STATE_BUCKET: tf-state-terragrunt-stacks
  STATE_PREFIX: stacks/vault-consul/production
  STATE_UNITS: vpc eks kms rds vault certs vault-config linkerd argocd github-runner

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Check HCL formatting
        run: |
          terragrunt hcl fmt
          git diff --exit-code || {
            echo "HCL files need formatting. Run: make fmt"
            exit 1
          }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate stack
        run: make stack-vault-production-generate

      - name: Validate stack
        run: |
          cd stacks/vault-consul/production
          terragrunt run --all validate ${{ env.TG_FLAGS }} 2>&1 | tee validate.log
          echo "✓ stack validate passed"

      - name: Policy as code (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: units
          framework: terraform
          output_format: cli
          soft_fail: false
          skip_check: CKV_AWS_144,CKV_AWS_18,CKV_TF_1,CKV2_AWS_5

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: IAM policy simulation
        run: |
          # assumed-role ARN → IAM role ARN
          # arn:aws:sts::ID:assumed-role/ROLE/SESSION → arn:aws:iam::ID:role/ROLE
          ROLE_ARN=$(aws sts get-caller-identity --query Arn --output text \
            | sed 's|sts|iam|;s|assumed-role|role|;s|/[^/]*$||')
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$ROLE_ARN" \
            --action-names \
              eks:CreateCluster eks:DescribeCluster \
              rds:CreateDBInstance rds:DescribeDBInstances \
              kms:CreateKey kms:DescribeKey \
              iam:PassRole iam:CreateRole \
              secretsmanager:CreateSecret \
              ec2:CreateVpc ec2:DescribeVpcs \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          if [ -n "$DENIED" ]; then
            echo "IAM denies: $DENIED"
            exit 1
          fi
          echo "IAM OK"

      # Vault provider's before_hook port-forwards via kubectl using
      # ~/.kube/config. EKS unit's after_hook only generates kubeconfig on
      # apply, so plan stage on a fresh runner has no kubeconfig → port-forward
      # fails → vault refresh errors with "connection refused". Generate it
      # explicitly here. Tolerate first-deploy failure (cluster may not exist).
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name terragrunt-infra-eks --region ${{ env.AWS_REGION }} || \
            echo "kubeconfig not generated (cluster may not exist yet — first deploy)"

      - name: Terragrunt plan
        id: plan
        env:
          GITHUB_CONFIG_URL: ${{ secrets.GITHUB_CONFIG_URL }}
          GITHUB_APP_ID: ${{ secrets.ARC_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.ARC_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.ARC_APP_PRIVATE_KEY }}
        run: |
          make stack-vault-production plan 2>&1 | tee plan.log
          exitcode=${PIPESTATUS[0]}
          echo "exitcode=$exitcode" >> "$GITHUB_OUTPUT"
          [ "$exitcode" -eq 1 ] && exit 1 || exit 0

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('stacks/vault-consul/production/plan.log', 'utf8');
            const truncated = log.length > 60000 ? '...(truncated)\n' + log.slice(-60000) : log;
            const body = `### Terragrunt Plan\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.apply)
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name terragrunt-infra-eks --region ${{ env.AWS_REGION }} || \
            echo "kubeconfig not generated (cluster may not exist yet — first deploy)"

      - name: Terragrunt apply
        env:
          GITHUB_CONFIG_URL: ${{ secrets.GITHUB_CONFIG_URL }}
          GITHUB_APP_ID: ${{ secrets.ARC_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.ARC_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.ARC_APP_PRIVATE_KEY }}
        run: make stack-vault-production apply
